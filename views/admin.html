<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 — 스톡인포</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', system-ui, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-box { background: #1a1a2e; padding: 40px; border-radius: 12px; text-align: center; }
    .login-box h1 { color: #10b981; margin-bottom: 20px; }
    .login-box input { padding: 12px 20px; border: 1px solid #333; border-radius: 8px; background: #111; color: #fff; font-size: 16px; width: 250px; }
    .login-box button { margin-top: 12px; padding: 12px 30px; background: #10b981; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    .login-box button:hover { background: #059669; }

    .admin-container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #333; margin-bottom: 20px; }
    .admin-header h1 { color: #10b981; font-size: 22px; }
    .tab-bar { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; border-radius: 8px; background: #1a1a2e; color: #aaa; cursor: pointer; border: none; font-size: 14px; }
    .tab.active { background: #10b981; color: #fff; }
    .tab .badge { background: #ef4444; color: #fff; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 6px; }

    .article-card { background: #1a1a2e; border-radius: 12px; padding: 20px; margin-bottom: 16px; border: 1px solid #2a2a3e; }
    .article-card h3 { color: #10b981; margin-bottom: 8px; font-size: 16px; }
    .article-meta { color: #888; font-size: 13px; margin-bottom: 12px; }
    .article-meta span { margin-right: 12px; }
    .article-source { color: #666; font-size: 12px; margin-bottom: 12px; word-break: break-all; }
    .article-preview { color: #bbb; font-size: 14px; line-height: 1.6; margin-bottom: 16px; max-height: 200px; overflow-y: auto; }
    .article-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
    .btn-approve { background: #10b981; color: #fff; }
    .btn-approve:hover { background: #059669; }
    .btn-reject { background: #ef4444; color: #fff; }
    .btn-reject:hover { background: #dc2626; }
    .btn-delete { background: #333; color: #ef4444; }
    .btn-delete:hover { background: #444; }
    .btn-preview { background: #333; color: #60a5fa; }
    .btn-preview:hover { background: #444; }
    .btn-edit { background: #333; color: #fbbf24; }
    .btn-edit:hover { background: #444; }
    .btn-publish { background: #10b981; color: #fff; }

    .empty { text-align: center; padding: 60px 20px; color: #666; }
    .empty .icon { font-size: 48px; margin-bottom: 16px; }
    .stats { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-box { background: #1a1a2e; padding: 16px 24px; border-radius: 10px; flex: 1; min-width: 120px; text-align: center; }
    .stat-box .num { font-size: 28px; font-weight: 700; color: #10b981; }
    .stat-box .label { color: #888; font-size: 13px; margin-top: 4px; }

    /* Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1a1a2e; border-radius: 12px; padding: 30px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; z-index: 101; }
    .modal h2 { color: #10b981; margin-bottom: 20px; }
    .modal .field { margin-bottom: 16px; }
    .modal label { display: block; color: #aaa; font-size: 13px; margin-bottom: 4px; }
    .modal input, .modal textarea { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 6px; background: #111; color: #fff; font-size: 14px; }
    .modal textarea { min-height: 300px; font-family: monospace; line-height: 1.5; }
    .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
    .content-preview { background: #111; padding: 20px; border-radius: 8px; line-height: 1.8; max-height: 60vh; overflow-y: auto; }
    .content-preview h2 { color: #10b981; margin: 20px 0 10px; font-size: 18px; }
    .content-preview blockquote { border-left: 3px solid #10b981; padding-left: 16px; background: rgba(16,185,129,0.05); margin: 10px 0; border-radius: 0 8px 8px 0; padding: 12px 16px; }
    .logout { background: none; border: 1px solid #555; color: #aaa; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginScreen" class="login-screen">
    <div class="login-box">
      <h1>🏥 스톡인포 관리자</h1>
      <input type="password" id="passwordInput" placeholder="비밀번호" onkeydown="if(event.key==='Enter')login()">
      <br>
      <button onclick="login()">로그인</button>
    </div>
  </div>

  <!-- Admin -->
  <div id="adminPanel" style="display:none">
    <div class="admin-container">
      <div class="admin-header">
        <h1>🏥 스톡인포 관리자</h1>
        <button class="logout" onclick="logout()">로그아웃</button>
      </div>

      <div class="stats" id="stats"></div>

      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('pending_write', this)">✏️ 작성 대기 <span class="badge" id="pendingWriteCount">0</span></button>
        <button class="tab" onclick="switchTab('draft', this)">⏳ 승인 대기 <span class="badge" id="draftCount">0</span></button>
        <button class="tab" onclick="switchTab('published', this)">✅ 게시됨</button>
        <button class="tab" onclick="switchTab('rejected', this)">❌ 거부됨</button>
        <button class="tab" onclick="switchTab('shares', this)">🔗 공유 현황</button>
        <button class="tab" onclick="switchTab('likes', this)">👍 좋아요 현황</button>
      </div>

      <div id="articleList"></div>
      <div id="likeList" class="hidden"></div>
      <div id="shareList" style="display:none"></div>
    </div>
  </div>

  <!-- Preview Modal -->
  <div class="modal-overlay" id="previewOverlay" onclick="closePreview()"></div>
  <div class="modal" id="previewModal" style="display:none">
    <h2 id="previewTitle"></h2>
    <div class="content-preview" id="previewContent"></div>
    <div class="modal-actions">
      <button class="btn btn-approve" onclick="approveFromPreview()">✅ 승인</button>
      <button class="btn btn-reject" onclick="rejectFromPreview()">❌ 거부</button>
      <button class="btn" style="background:#555;color:#fff" onclick="closePreview()">닫기</button>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editOverlay" onclick="closeEdit()"></div>
  <div class="modal" id="editModal" style="display:none">
    <h2>✏️ 글 수정</h2>
    <div id="editThumbPreview" style="margin-bottom:16px"></div>
    <div class="field">
      <label>제목 (한국어)</label>
      <input id="editTitleKo">
    </div>
    <div class="field">
      <label>제목 (English)</label>
      <input id="editTitleEn">
    </div>
    <div class="field">
      <label>내용 (한국어) — Markdown</label>
      <textarea id="editContentKo"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-publish" onclick="saveEdit()">💾 저장</button>
      <button class="btn" style="background:#555;color:#fff" onclick="closeEdit()">취소</button>
    </div>
  </div>

  <script>
    let TOKEN = '';
    let currentTab = 'pending_write';
    let previewingId = null;
    let editingId = null;

    function login() {
      TOKEN = document.getElementById('passwordInput').value;
      fetch('/api/admin/articles?status=pending_write', { headers: { Authorization: `Bearer ${TOKEN}` } })
        .then(r => { if (!r.ok) throw new Error(); return r.json(); })
        .then(() => {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          loadStats();
          loadArticles('pending_write');
        })
        .catch(() => alert('비밀번호가 틀렸습니다'));
    }

    function logout() {
      TOKEN = '';
      document.getElementById('adminPanel').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
    }

    async function loadStats() {
      const [pendingWrite, draft, published, rejected] = await Promise.all([
        fetch('/api/admin/articles?status=pending_write', { headers: { Authorization: `Bearer ${TOKEN}` } }).then(r => r.json()),
        fetch('/api/admin/articles?status=draft', { headers: { Authorization: `Bearer ${TOKEN}` } }).then(r => r.json()),
        fetch('/api/admin/articles?status=published', { headers: { Authorization: `Bearer ${TOKEN}` } }).then(r => r.json()),
        fetch('/api/admin/articles?status=rejected', { headers: { Authorization: `Bearer ${TOKEN}` } }).then(r => r.json()),
      ]);
      document.getElementById('pendingWriteCount').textContent = pendingWrite.length;
      document.getElementById('draftCount').textContent = draft.length;
      document.getElementById('stats').innerHTML = `
        <div class="stat-box"><div class="num">${pendingWrite.length}</div><div class="label">작성 대기</div></div>
        <div class="stat-box"><div class="num">${draft.length}</div><div class="label">승인 대기</div></div>
        <div class="stat-box"><div class="num">${published.length}</div><div class="label">게시됨</div></div>
        <div class="stat-box"><div class="num">${rejected.length}</div><div class="label">거부됨</div></div>
        <div class="stat-box"><div class="num">${draft.length + published.length + rejected.length}</div><div class="label">전체</div></div>
      `;
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      if (tab === 'likes') {
        document.getElementById('likeList').classList.remove('hidden');
        document.getElementById('articleList').classList.add('hidden');
        document.getElementById('shareList').classList.add('hidden'); if(document.getElementById('likeList')) document.getElementById('likeList').classList.add('hidden');
        loadLikes();
        return;
      }
      if (tab === 'shares') {
        document.getElementById('articleList').style.display = 'none';
        document.getElementById('shareList').style.display = 'block';
        document.getElementById('likeList').classList.add('hidden'); loadShares();
      } else {
        document.getElementById('articleList').style.display = 'block';
        document.getElementById('shareList').style.display = 'none';
        loadArticles(tab);
      }
    }

    
    async function loadLikes() {
      const res = await fetch('/api/admin/likes', { headers: { Authorization: `Bearer ${TOKEN}` } });
      const likes = await res.json();
      const list = document.getElementById('likeList');
      if (!likes.length) {
        list.innerHTML = '<div class="empty"><div class="icon">👍</div><p>아직 좋아요가 없어요</p></div>';
        return;
      }
      list.innerHTML = `
        <table style="width:100%;border-collapse:collapse;color:#e0e0e0;font-size:14px">
          <thead>
            <tr style="border-bottom:2px solid #333;text-align:left">
              <th style="padding:12px 8px">ID</th>
              <th style="padding:12px 8px">제목</th>
              <th style="padding:12px 8px;text-align:center">👍 좋아요</th>
              <th style="padding:12px 8px;text-align:center">👀 조회</th>
              <th style="padding:12px 8px;text-align:center">🔗 공유</th>
              <th style="padding:12px 8px">마지막 좋아요</th>
              <th style="padding:12px 8px">링크</th>
            </tr>
          </thead>
          <tbody>
            ${likes.map((s, i) => `
              <tr style="border-bottom:1px solid #222;background:${i % 2 ? '#111' : '#0a0a0a'}">
                <td style="padding:10px 8px;color:#888">${s.id}</td>
                <td style="padding:10px 8px">${s.title_ko}</td>
                <td style="padding:10px 8px;text-align:center;font-weight:700;color:#10b981;font-size:18px">${s.like_count}</td>
                <td style="padding:10px 8px;text-align:center;color:#60a5fa">${s.view_count || 0}</td>
                <td style="padding:10px 8px;text-align:center;color:#10b981">${s.share_count || 0}</td>
                <td style="padding:10px 8px;color:#888">${s.last_liked ? new Date(s.last_liked).toLocaleString('ko-KR') : '-'}</td>
                <td style="padding:10px 8px"><a href="/article/${s.slug}" target="_blank" style="color:#10b981;text-decoration:none">↗️ 보기</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div style="margin-top:16px;color:#666;font-size:13px">총 ${likes.length}건, 전체 좋아요 ${likes.reduce((s, x) => s + x.like_count, 0)}회</div>
      `;
    }

    async function loadShares() {
      const res = await fetch('/api/admin/shares', { headers: { Authorization: `Bearer ${TOKEN}` } });
      const shares = await res.json();
      const list = document.getElementById('shareList');
      if (!shares.length) {
        list.innerHTML = '<div class="empty"><div class="icon">🔗</div><p>아직 공유된 글이 없어요</p></div>';
        return;
      }
      list.innerHTML = `
        <table style="width:100%;border-collapse:collapse;color:#e0e0e0;font-size:14px">
          <thead>
            <tr style="border-bottom:2px solid #333;text-align:left">
              <th style="padding:12px 8px">ID</th>
              <th style="padding:12px 8px">제목</th>
              <th style="padding:12px 8px;text-align:center">🔗 공유</th>
              <th style="padding:12px 8px;text-align:center">👀 조회</th>
              <th style="padding:12px 8px">마지막 공유</th>
              <th style="padding:12px 8px">링크</th>
            </tr>
          </thead>
          <tbody>
            ${shares.map((s, i) => `
              <tr style="border-bottom:1px solid #222;background:${i % 2 ? '#111' : '#0a0a0a'}">
                <td style="padding:10px 8px;color:#888">${s.id}</td>
                <td style="padding:10px 8px">${s.title_ko}</td>
                <td style="padding:10px 8px;text-align:center;font-weight:700;color:#10b981;font-size:18px">${s.share_count}</td>
                <td style="padding:10px 8px;text-align:center;color:#60a5fa">${s.view_count || 0}</td>
                <td style="padding:10px 8px;color:#888">${s.last_shared ? new Date(s.last_shared).toLocaleString('ko-KR') : '-'}</td>
                <td style="padding:10px 8px"><a href="/article/${s.slug}" target="_blank" style="color:#10b981;text-decoration:none">↗️ 보기</a></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        <div style="margin-top:16px;color:#666;font-size:13px">총 ${shares.length}건, 전체 공유 ${shares.reduce((s, x) => s + x.share_count, 0)}회</div>
      `;
    }

    async function loadArticles(status) {
      const res = await fetch(`/api/admin/articles?status=${status}`, { headers: { Authorization: `Bearer ${TOKEN}` } });
      const articles = await res.json();
      const list = document.getElementById('articleList');

      if (!articles.length) {
        const icons = { pending_write: '📝', draft: '📭', published: '📚', rejected: '🗑️' };
        const msgs = { pending_write: '작성 대기 중인 글이 없어요', draft: '승인 대기 중인 글이 없어요', published: '게시된 글이 없어요', rejected: '거부된 글이 없어요' };
        list.innerHTML = `<div class="empty"><div class="icon">${icons[status] || '📭'}</div><p>${msgs[status] || ''}</p></div>`;
        return;
      }

      list.innerHTML = articles.map(a => `
        <div class="article-card" id="card-${a.id}">
          <h3>${a.title_ko}</h3>
          <div class="article-meta">
            <span>📂 ${a.category_name_ko}</span>
            <span>📅 ${new Date(a.created_at).toLocaleDateString('ko-KR')}</span>
            <span>📰 ${a.source_journal || ''}</span>
          </div>
          <div class="article-source">원제: ${a.source_title || ''}</div>
          <div class="article-preview">${a.summary_ko || ''}</div>
          <div class="article-actions">
            ${status === 'pending_write' ? `
              <span style="color:#fbbf24;font-size:13px;padding:8px 0">📝 기사 작성 대기 중 (PMID: ${a.source_pmid || '-'})</span>
            ` : `
              <button class="btn btn-preview" onclick="openPreview(${a.id})">👁️ 미리보기</button>
              <button class="btn btn-edit" onclick="openEdit(${a.id})">✏️ 수정</button>
            `}
            ${status === 'draft' ? `
              <button class="btn btn-approve" onclick="approve(${a.id})">✅ 승인</button>
              <button class="btn btn-reject" onclick="reject(${a.id})">❌ 거부</button>
            ` : ''}
            ${status === 'rejected' ? `
              <button class="btn btn-approve" onclick="approve(${a.id})">✅ 복원</button>
            ` : ''}
            ${status === 'published' ? `
              <button class="btn btn-reject" onclick="reject(${a.id})">⏸️ 비공개</button>
            ` : ''}
            <button class="btn btn-delete" onclick="deleteArticle(${a.id})">🗑️ 삭제</button>
          </div>
        </div>
      `).join('');
    }

    async function approve(id) {
      await fetch(`/api/admin/articles/${id}/approve`, { method: 'POST', headers: { Authorization: `Bearer ${TOKEN}` } });
      loadArticles(currentTab);
      loadStats();
    }

    async function reject(id) {
      await fetch(`/api/admin/articles/${id}/reject`, { method: 'POST', headers: { Authorization: `Bearer ${TOKEN}` } });
      loadArticles(currentTab);
      loadStats();
    }

    async function deleteArticle(id) {
      if (!confirm('정말 삭제하시겠습니까?')) return;
      await fetch(`/api/admin/articles/${id}`, { method: 'DELETE', headers: { Authorization: `Bearer ${TOKEN}` } });
      loadArticles(currentTab);
      loadStats();
    }

    // Simple markdown to HTML
    function md(text) {
      if (!text) return '';
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/^## (.*$)/gm, '<h2>$1</h2>')
        .replace(/^### (.*$)/gm, '<h3>$1</h3>')
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/^> (.*$)/gm, '<blockquote>$1</blockquote>')
        .replace(/^- (.*$)/gm, '<li>$1</li>')
        .replace(/^✅ (.*$)/gm, '<p>✅ $1</p>')
        .replace(/\n\n/g, '<br><br>')
        .replace(/\n/g, '<br>');
    }

    async function openPreview(id) {
      previewingId = id;
      const res = await fetch(`/api/admin/articles/${id}`, { headers: { Authorization: `Bearer ${TOKEN}` } });
      const a = await res.json();
      document.getElementById('previewTitle').textContent = a.title_ko || a.title;
      const thumbHtml = a.thumbnail ? `<img src="${a.thumbnail}" style="width:100%;max-height:300px;object-fit:cover;border-radius:8px;margin-bottom:16px" alt="">` : '';
      document.getElementById('previewContent').innerHTML = thumbHtml + md(a.content_ko || a.content || '');
      document.getElementById('previewOverlay').style.display = 'block';
      document.getElementById('previewModal').style.display = 'block';
    }

    function closePreview() {
      document.getElementById('previewOverlay').style.display = 'none';
      document.getElementById('previewModal').style.display = 'none';
      previewingId = null;
    }

    function approveFromPreview() { if (previewingId) { approve(previewingId); closePreview(); } }
    function rejectFromPreview() { if (previewingId) { reject(previewingId); closePreview(); } }

    async function openEdit(id) {
      editingId = id;
      const res = await fetch(`/api/admin/articles/${id}`, { headers: { Authorization: `Bearer ${TOKEN}` } });
      const a = await res.json();
      document.getElementById('editTitleKo').value = a.title_ko || '';
      document.getElementById('editTitleEn').value = a.title || '';
      document.getElementById('editContentKo').value = a.content_ko || '';
      document.getElementById('editThumbPreview').innerHTML = a.thumbnail
        ? `<img src="${a.thumbnail}" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px" alt=""><p style="font-size:11px;color:#888;margin-top:4px;word-break:break-all">${a.thumbnail}</p>`
        : '<p style="color:#666;font-size:13px">🖼️ 썸네일 없음</p>';
      document.getElementById('editOverlay').style.display = 'block';
      document.getElementById('editModal').style.display = 'block';
    }

    function closeEdit() {
      document.getElementById('editOverlay').style.display = 'none';
      document.getElementById('editModal').style.display = 'none';
      editingId = null;
    }

    async function saveEdit() {
      if (!editingId) return;
      const body = {
        title_ko: document.getElementById('editTitleKo').value,
        title: document.getElementById('editTitleEn').value,
        content_ko: document.getElementById('editContentKo').value,
      };
      await fetch(`/api/admin/articles/${editingId}`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      closeEdit();
      loadArticles(currentTab);
      alert('저장 완료!');
    }
  </script>
</body>
</html>
