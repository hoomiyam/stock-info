<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>문의하기 | 스톡인포</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PM8NDCDGW1"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PM8NDCDGW1');</script>
  <style>
    body{margin:0;font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b}
    .wrap{max-width:740px;margin:0 auto;padding:24px 16px}
    h1{font-size:24px;font-weight:900;color:#064e3b;margin-bottom:8px}
    .subtitle{color:#64748b;font-size:14px;margin-bottom:32px}
    .section{background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .section h2{font-size:17px;font-weight:800;color:#064e3b;margin:0 0 16px;padding-left:12px;border-left:4px solid #10b981}
    .contact-item{display:flex;align-items:flex-start;gap:12px;margin-bottom:16px;padding:12px;background:#f0fdf4;border-radius:10px}
    .contact-icon{font-size:24px;flex-shrink:0}
    .contact-info h3{margin:0 0 4px;font-size:15px;font-weight:700}
    .contact-info p{margin:0;font-size:13px;color:#64748b;line-height:1.6}
    .contact-info a{color:#10b981;text-decoration:none;font-weight:600}
    .contact-info a:hover{text-decoration:underline}
    .faq-item{border-bottom:1px solid #e2e8f0;padding:14px 0}
    .faq-item:last-child{border-bottom:none}
    .faq-q{font-weight:700;font-size:14px;margin-bottom:6px;color:#1e293b}
    .faq-a{font-size:13px;color:#64748b;line-height:1.7}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .back-link{display:inline-flex;align-items:center;gap:4px;color:#64748b;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;background:#f1f5f9;text-decoration:none}
    .back-link:hover{background:#e2e8f0;color:#1e293b}
    .lang-btn{padding:6px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:12px;cursor:pointer;font-weight:600}
    .lang-btn:hover{background:#f0fdf4;border-color:#10b981}
    .footer{max-width:740px;margin:0 auto;padding:24px 16px;text-align:center;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0}
    .footer a{color:#64748b;margin:0 6px;text-decoration:none}
    .footer a:hover{color:#10b981}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <a href="/" class="back-link" data-ko="← 홈으로" data-en="← Home"></a>
      <button class="lang-btn" onclick="toggleLang()">EN</button>
    </div>
    <h1 data-ko="📬 문의하기" data-en="📬 Contact Us"></h1>
    <p class="subtitle" data-ko="스톡인포에 대한 의견, 제안, 오류 신고 등을 보내주세요." data-en="Send us your feedback, suggestions, or bug reports."></p>

    <div class="section">
      <h2 data-ko="연락처" data-en="Contact"></h2>
      <div class="contact-item">
        <span class="contact-icon">📧</span>
        <div class="contact-info">
          <h3 data-ko="이메일" data-en="Email"></h3>
          <p><a href="mailto:hoomiyam@gmail.com">hoomiyam@gmail.com</a></p>
          <p data-ko="일반 문의, 콘텐츠 제안, 오류 신고 등" data-en="General inquiries, content suggestions, bug reports, etc."></p>
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">💬</span>
        <div class="contact-info">
          <h3 data-ko="응답 시간" data-en="Response Time"></h3>
          <p data-ko="보통 1~2 영업일 이내에 답변드려요. 주말·공휴일에는 답변이 늦어질 수 있어요." data-en="We usually respond within 1-2 business days. Responses may be delayed on weekends and holidays."></p>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 data-ko="이런 내용을 보내주세요" data-en="What You Can Send Us"></h2>
      <div class="contact-item">
        <span class="contact-icon">💡</span>
        <div class="contact-info">
          <h3 data-ko="콘텐츠 제안" data-en="Content Suggestions"></h3>
          <p data-ko="&quot;이런 주제에 대한 글이 있으면 좋겠어요!&quot; 여러분의 제안이 콘텐츠를 만들어요." data-en="&quot;I'd love to see an article about this topic!&quot; Your suggestions help shape our content."></p>
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">🐛</span>
        <div class="contact-info">
          <h3 data-ko="오류 신고" data-en="Bug Reports"></h3>
          <p data-ko="잘못된 정보나 오타를 발견하셨나요? 알려주시면 빠르게 수정할게요." data-en="Found incorrect information or a typo? Let us know and we'll fix it quickly."></p>
        </div>
      </div>
      <div class="contact-item">
        <span class="contact-icon">🤝</span>
        <div class="contact-info">
          <h3 data-ko="제휴·협력" data-en="Partnerships"></h3>
          <p data-ko="건강 관련 콘텐츠 협력, 광고 문의 등도 환영합니다." data-en="We welcome health content partnerships and advertising inquiries."></p>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 data-ko="자주 묻는 질문" data-en="FAQ"></h2>
      <div>
        <div class="faq-item">
          <div class="faq-q" data-ko="Q. 스톡인포의 정보를 의료 상담 대신 사용할 수 있나요?" data-en="Q. Can I use HealthInfo instead of consulting a doctor?"></div>
          <div class="faq-a" data-ko="아니요. 스톡인포는 의학 논문을 바탕으로 건강 정보를 쉽게 전달하는 것이 목적이에요. 구체적인 건강 문제는 반드시 의료 전문가와 상담하세요." data-en="No. HealthInfo aims to make medical research accessible. For specific health concerns, always consult a healthcare professional."></div>
        </div>
        <div class="faq-item">
          <div class="faq-q" data-ko="Q. 글에 사용된 논문 원문을 볼 수 있나요?" data-en="Q. Can I read the original research papers?"></div>
          <div class="faq-a" data-ko="네! 모든 글 하단에 논문 원문 링크가 있어요. PubMed에서 무료로 초록을 확인할 수 있어요." data-en="Yes! Every article includes a link to the original paper. You can read the abstract for free on PubMed."></div>
        </div>
        <div class="faq-item">
          <div class="faq-q" data-ko="Q. 콘텐츠 업데이트는 얼마나 자주 되나요?" data-en="Q. How often is content updated?"></div>
          <div class="faq-a" data-ko="매일 2회(오전/오후) 최신 논문을 수집하고 새 글을 발행해요. 항상 최신 연구를 확인할 수 있어요." data-en="We collect and publish new papers twice daily (AM/PM). You can always find the latest research."></div>
        </div>
        <div class="faq-item">
          <div class="faq-q" data-ko="Q. 한국어와 영어 모두 지원하나요?" data-en="Q. Is the site available in both Korean and English?"></div>
          <div class="faq-a" data-ko="네! 상단 메뉴에서 한국어/EN 버튼으로 언어를 전환할 수 있어요." data-en="Yes! Use the language toggle button at the top to switch between Korean and English."></div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p data-ko="© 2026 스톡인포 — 논문 기반 건강 정보" data-en="© 2026 HealthInfo — Evidence-Based Health Information"></p>
    <a href="/" data-ko="홈" data-en="Home"></a> |
    <a href="/about" data-ko="소개" data-en="About"></a> |
    <a href="/privacy" data-ko="개인정보처리방침" data-en="Privacy Policy"></a> |
    <a href="/terms" data-ko="이용약관" data-en="Terms"></a> |
    <a href="/contact" data-ko="문의하기" data-en="Contact"></a>
  </div>

  <script>
    let lang = localStorage.getItem('health-lang') || 'ko';
    function applyLang() {
      document.querySelectorAll('[data-ko]').forEach(el => {
        el.textContent = lang === 'ko' ? el.dataset.ko : el.dataset.en;
      });
      document.querySelector('.lang-btn').textContent = lang === 'ko' ? 'EN' : '한국어';
      document.title = lang === 'ko' ? '문의하기 | 스톡인포' : 'Contact | HealthInfo';
    }
    function toggleLang() {
      lang = lang === 'ko' ? 'en' : 'ko';
      localStorage.setItem('health-lang', lang);
      applyLang();
    }
    applyLang();
  </script>
</body>
</html>
