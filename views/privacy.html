<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>개인정보처리방침 — 스톡인포</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PM8NDCDGW1"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-PM8NDCDGW1');</script>
  <style>
    body{margin:0;font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b}
    .wrap{max-width:740px;margin:0 auto;padding:24px 16px}
    h1{font-size:24px;font-weight:900;color:#064e3b;margin-bottom:8px}
    .date{font-size:12px;color:#94a3b8;margin-bottom:24px}
    .section{background:#fff;border-radius:16px;padding:28px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .section h2{font-size:16px;font-weight:800;color:#064e3b;margin:0 0 12px;padding:8px 12px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:8px;border-left:4px solid #10b981}
    .section p,.section li{font-size:14px;line-height:1.8;color:#475569}
    .section ul{padding-left:20px}
    .section li{margin:6px 0}
    .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
    .back-link{display:inline-flex;align-items:center;gap:4px;color:#64748b;font-size:13px;font-weight:600;padding:6px 12px;border-radius:8px;background:#f1f5f9;text-decoration:none}
    .back-link:hover{background:#e2e8f0;color:#1e293b}
    .lang-btn{padding:6px 14px;border-radius:8px;border:1px solid #e2e8f0;background:#fff;font-size:12px;cursor:pointer;font-weight:600}
    .lang-btn:hover{background:#f0fdf4;border-color:#10b981}
    .footer{max-width:740px;margin:0 auto;padding:24px 16px;text-align:center;font-size:11px;color:#94a3b8;border-top:1px solid #e2e8f0}
    .footer a{color:#64748b;margin:0 6px;text-decoration:none}
    .footer a:hover{color:#10b981}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-bar">
      <a href="/" class="back-link" data-ko="← 홈으로" data-en="← Home"></a>
      <button class="lang-btn" onclick="toggleLang()">EN</button>
    </div>
    <h1 data-ko="🔒 개인정보처리방침" data-en="🔒 Privacy Policy"></h1>
    <p class="date" data-ko="최종 수정일: 2026년 3월 22일" data-en="Last updated: March 22, 2026"></p>

    <div class="section">
      <h2 data-ko="수집하는 정보" data-en="Information We Collect"></h2>
      <p data-ko="본 사이트는 Google Analytics를 통해 익명화된 사용 통계(방문 페이지, 체류 시간, 기기 유형)를 수집합니다. 개인 식별 가능 정보는 수집하지 않습니다." data-en="This site collects anonymized usage statistics through Google Analytics (pages visited, time spent, device type). We do not collect personally identifiable information."></p>
    </div>

    <div class="section">
      <h2 data-ko="쿠키" data-en="Cookies"></h2>
      <p data-ko="Google Analytics 및 Google AdSense가 분석 및 맞춤형 광고 제공을 위해 쿠키를 사용할 수 있습니다. 브라우저 설정에서 쿠키 관리가 가능합니다." data-en="Google Analytics and Google AdSense may use cookies for analytics and personalized advertising. You can manage cookies through your browser settings."></p>
    </div>

    <div class="section">
      <h2 data-ko="제3자 서비스" data-en="Third-Party Services"></h2>
      <ul>
        <li data-ko="Google Analytics — 사이트 이용 분석" data-en="Google Analytics — Site usage analytics"></li>
        <li data-ko="Google AdSense — 광고 제공" data-en="Google AdSense — Advertising"></li>
      </ul>
    </div>

    <div class="section">
      <h2 data-ko="데이터 보관" data-en="Data Retention"></h2>
      <p data-ko="수집된 분석 데이터는 Google의 개인정보처리방침에 따라 관리됩니다. 자세한 내용은 Google 개인정보처리방침을 참조하세요." data-en="Collected analytics data is managed according to Google's Privacy Policy. Please refer to Google's Privacy Policy for details."></p>
    </div>

    <div class="section">
      <h2 data-ko="이용자의 권리" data-en="Your Rights"></h2>
      <ul>
        <li data-ko="쿠키를 거부하거나 삭제할 수 있습니다." data-en="You can reject or delete cookies."></li>
        <li data-ko="Google Analytics 수집을 차단할 수 있습니다 (Google Analytics Opt-out 브라우저 확장 프로그램)." data-en="You can block Google Analytics collection (Google Analytics Opt-out browser extension)."></li>
        <li data-ko="개인정보 관련 요청은 아래 연락처로 보내주세요." data-en="For privacy-related requests, please contact us below."></li>
      </ul>
    </div>

    <div class="section">
      <h2 data-ko="문의" data-en="Contact"></h2>
      <p><span data-ko="개인정보 관련 문의: " data-en="Privacy inquiries: "></span><a href="mailto:hoomiyam@gmail.com" style="color:#10b981;font-weight:600">hoomiyam@gmail.com</a></p>
    </div>
  </div>

  <div class="footer">
    <p data-ko="© 2026 스톡인포 — 논문 기반 건강 정보" data-en="© 2026 HealthInfo — Evidence-Based Health Information"></p>
    <a href="/" data-ko="홈" data-en="Home"></a> |
    <a href="/about" data-ko="소개" data-en="About"></a> |
    <a href="/privacy" data-ko="개인정보처리방침" data-en="Privacy Policy"></a> |
    <a href="/terms" data-ko="이용약관" data-en="Terms"></a> |
    <a href="/contact" data-ko="문의하기" data-en="Contact"></a>
  </div>

  <script>
    let lang = localStorage.getItem('health-lang') || 'ko';
    function applyLang() {
      document.querySelectorAll('[data-ko]').forEach(el => {
        el.textContent = lang === 'ko' ? el.dataset.ko : el.dataset.en;
      });
      document.querySelector('.lang-btn').textContent = lang === 'ko' ? 'EN' : '한국어';
      document.title = lang === 'ko' ? '개인정보처리방침 — 스톡인포' : 'Privacy Policy — HealthInfo';
    }
    function toggleLang() {
      lang = lang === 'ko' ? 'en' : 'ko';
      localStorage.setItem('health-lang', lang);
      applyLang();
    }
    applyLang();
  </script>
</body>
</html>
